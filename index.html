<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLN Travel | Smart Travel Rewards & AI Strategy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Icon Helper
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconHtml, setIconHtml] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) setIconHtml(icon.toSvg({ size, class: className }));
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} />;
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [showAiModal, setShowAiModal] = useState(false);
            const [aiPrompt, setAiPrompt] = useState('');
            const [aiResponse, setAiResponse] = useState('');

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const CLUB_LINK = "https://travorium.com/enroll.php?sponsor=812209";

            const cards = [
                {
                    name: "Chase Sapphire",
                    href: "https://www.referyourchasecard.com/19v/VPE9DLPCZ2",
                    tag: "Best for Beginners",
                    desc: "High earning rates for every daily purchase."
                },
                {
                    name: "Amex Platinum",
                    href: "https://americanexpress.com/en-us/referral/platinum-card?ref=CHARIN1d66&xl=cp15",
                    tag: "Luxury Travel",
                    desc: "Elite airport lounge access and annual credits."
                },
                {
                    name: "Southwest Rewards",
                    href: "https://www.referyourchasecard.com/226m/3O0FM8ERL9",
                    tag: "Domestic Favorite",
                    desc: "The easiest way to fly the US and Caribbean."
                },
                {
                    name: "Marriott Bonvoy",
                    href: "https://www.referyourchasecard.com/252u/58BZKWECA4",
                    tag: "Hotel Specialist",
                    desc: "Earn points for free nights at 8,000+ hotels."
                }
            ];

            return (
                <div className="min-h-screen bg-white text-slate-900">
                    <div className="bg-slate-950 text-white text-[10px] py-2 text-center font-bold uppercase tracking-widest">
                        AD: I may earn a commission at no cost to you. I only recommend what I use.
                    </div>

                    <nav className={`fixed w-full z-50 transition-all ${isScrolled ? 'bg-white/90 shadow-sm py-4' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold italic">C</div>
                                <span className="text-xl font-black uppercase tracking-tighter">CLN <span className="text-blue-600 text-lg">Travel</span></span>
                            </div>
                            <a href={CLUB_LINK} target="_blank" className="bg-slate-900 text-white px-6 py-2 rounded-full font-bold text-xs uppercase hover:bg-blue-600 transition-colors">Join Club</a>
                        </div>
                    </nav>

                    <section className="pt-48 pb-24 px-6 text-center">
                        <div className="inline-block bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase mb-6 tracking-widest border border-blue-100">
                            ✨ AI Strategy Suite 2026
                        </div>
                        <h1 className="text-6xl md:text-8xl font-black mb-6 tracking-tighter uppercase leading-[0.85]">
                            Travel<br/>For <span className="text-blue-600 italic">Free</span>
                        </h1>
                        <p className="text-slate-500 mb-10 max-w-lg mx-auto font-medium text-lg">
                            Stop paying full price. Use my credit card strategy and AI planner to unlock the world.
                        </p>
                        <div className="flex flex-col sm:flex-row justify-center gap-4">
                            <button onClick={() => setShowAiModal(true)} className="bg-blue-600 text-white px-10 py-5 rounded-full font-black uppercase tracking-widest shadow-2xl shadow-blue-200">
                                Build My ✨ AI Strategy
                            </button>
                            <a href={CLUB_LINK} target="_blank" className="border-2 border-slate-200 px-10 py-5 rounded-full font-black uppercase tracking-widest hover:border-slate-900 transition-all">
                                Travel Club Access
                            </a>
                        </div>
                    </section>

                    <section className="py-20 max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {cards.map((card, i) => (
                            <a key={i} href={card.href} target="_blank" className="group bg-white p-10 rounded-[3rem] border-2 border-slate-50 hover:border-blue-600 transition-all shadow-sm">
                                <div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                    <Icon name="CreditCard" />
                                </div>
                                <div className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2">{card.tag}</div>
                                <h3 className="font-black uppercase tracking-tighter text-xl mb-3">{card.name}</h3>
                                <p className="text-slate-400 text-sm font-medium leading-relaxed">{card.desc}</p>
                            </a>
                        ))}
                    </section>

                    {showAiModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md" onClick={() => setShowAiModal(false)}></div>
                            <div className="bg-white w-full max-w-lg rounded-[3.5rem] relative z-10 p-10 shadow-2xl">
                                <button onClick={() => setShowAiModal(false)} className="absolute top-10 right-10 text-slate-300 hover:text-slate-900"><Icon name="X" /></button>
                                <h2 className="text-4xl font-black uppercase tracking-tighter mb-6">AI Planner ✨</h2>
                                
                                {!aiResponse ? (
                                    <div className="space-y-4">
                                        <textarea 
                                            value={aiPrompt} 
                                            onChange={(e) => setAiPrompt(e.target.value)} 
                                            placeholder="I want to go to Italy next summer. How do I start?" 
                                            className="w-full h-40 bg-slate-50 border-none rounded-3xl p-6 outline-none focus:ring-2 focus:ring-blue-600 font-medium" 
                                        />
                                        <button onClick={() => setAiResponse("Almost ready! To activate the AI, please connect your Gemini API key in your Vercel settings.")} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest">
                                            Get Strategy
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="bg-slate-50 p-6 rounded-3xl text-sm leading-relaxed font-medium">
                                            {aiResponse}
                                        </div>
                                        <button onClick={() => setAiResponse('')} className="w-full border-2 py-4 rounded-2xl font-black uppercase text-xs text-slate-400">
                                            Reset Planner
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer className="py-20 text-center border-t border-slate-50">
                        <p className="text-[10px] font-black uppercase tracking-widest text-slate-300">CLN Travel © 2026 • Build Your Dream Life</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
